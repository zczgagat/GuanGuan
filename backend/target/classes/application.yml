server:
  port: 8080

app:
  upload-dir: uploads/avatars

ai:
  api-key: sk-b992d8a187454f61a9ec28d2a222c4e2
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-chat

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:h2:file:./data/familytree;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

